name: CI — Airflow DAG Tests

on:
  pull_request:
    branches: [main, develop]
    paths: ["airflow/**", ".github/workflows/ci_airflow.yml"]

jobs:
  dag-tests:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Airflow + test deps
        run: |
          pip install \
            apache-airflow==3.0.0 \
            apache-airflow-providers-google \
            apache-airflow-providers-apache-spark \
            pytest pytest-cov

      - name: AirflowDB init (SQLite, CI only)
        env:
          AIRFLOW__CORE__EXECUTOR: SequentialExecutor
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow_ci.db
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        run: airflow db migrate

      - name: Run DAG unit tests
        # NOTE: These are dummy/test values for CI testing
        # TODO: For production deployment, update the GCP_PROJECT_ID secret in:
        # GitHub Settings > Secrets and Variables > Actions
        # Name: GCP_PROJECT_ID
        # Value: your-actual-gcp-project-id (e.g., "my-project-123456")
        env:
          AIRFLOW__CORE__EXECUTOR: SequentialExecutor
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow_ci.db
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'ci-test-project-123456' }}
          GOOGLE_APPLICATION_CREDENTIALS: /dev/null
        run: |
          pytest airflow/tests/ -v \
            --tb=short \
            --cov=airflow/dags \
            --cov-report=term-missing