x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
    args:
      BUILDKIT_INLINE_CACHE: "1"
    cache_from:
      - apache/airflow:3.1.8-python3.11
  image: apache/airflow:3.1.8-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__SECRET_KEY: ${AIRFLOW__CORE__SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    GOOGLE_APPLICATION_CREDENTIALS: /opt/secrets/gcp-sa-key.json
    DBT_PROFILES_DIR: /opt/dbt
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./dbt:/opt/dbt
    - ./kafka:/opt/airflow/kafka
    - ./secrets:/opt/secrets:ro
  depends_on:
    postgres:
      condition: service_healthy
    postgres-source:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - data-platform-net
  restart: unless-stopped

x-spark-common: &spark-common
  build:
    context: .
    dockerfile: docker/spark/Dockerfile
    args:
      BUILDKIT_INLINE_CACHE: "1"
    cache_from:
      - apache/spark:4.0.0
  image: spark-custom:4.0.0
  volumes:
    - ./spark/jobs:/opt/spark/jobs
    - ./secrets:/opt/secrets:ro
  networks:
    - data-platform-net
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - data-platform-net
    restart: unless-stopped

  postgres-source:
    image: postgres:16-alpine
    container_name: postgres-source
    environment:
      POSTGRES_USER: ${SOURCE_DB_USER}
      POSTGRES_PASSWORD: ${SOURCE_DB_PASSWORD}
      POSTGRES_DB: ${SOURCE_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres-source-data:/var/lib/postgresql/data
      - ./docker/postgres-source/init:/docker-entrypoint-initdb.d:ro
      - ./data/csv:/tmp/csv:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${SOURCE_DB_USER}", "-d", "${SOURCE_DB_NAME}"]
      interval: 10s
      retries: 5
      start_period: 15s
    networks:
      - data-platform-net
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    networks:
      - data-platform-net
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer

  airflow-worker:
    <<: *airflow-common
    command:
      - bash
      - -c
      - airflow db migrate && exec celery -A airflow.providers.celery.executors.celery_executor.app worker --loglevel=info
    environment:
      DUMB_INIT_SETSID: "0"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  airflow-init:
    <<: *airflow-common
    environment:
      AIRFLOW__CORE__DASHBOARD_USER_USERNAME: ${AIRFLOW__CORE__DASHBOARD_USER_USERNAME}
      AIRFLOW__CORE__DASHBOARD_USER_PASSWORD: ${AIRFLOW__CORE__DASHBOARD_USER_PASSWORD}
      AIRFLOW__CORE__DASHBOARD_USER_FIRSTNAME: ${AIRFLOW__CORE__DASHBOARD_USER_FIRSTNAME}
      AIRFLOW__CORE__DASHBOARD_USER_LASTNAME: ${AIRFLOW__CORE__DASHBOARD_USER_LASTNAME}
      AIRFLOW__CORE__DASHBOARD_USER_EMAIL: ${AIRFLOW__CORE__DASHBOARD_USER_EMAIL}
      AIRFLOW__CORE__DASHBOARD_USER_ROLE: ${AIRFLOW__CORE__DASHBOARD_USER_ROLE}
    command: db migrate
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - data-platform-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - data-platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - data-platform-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - data-platform-net

  kafka-consumer:
    <<: *airflow-common
    command: python kafka/consumers/gcs_sink_consumer.py
    depends_on:
      - kafka
      - schema-registry
    networks:
      - data-platform-net
    restart: unless-stopped

  spark-master:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8082:8080"
    environment:
      SPARK_MODE: master
      GOOGLE_APPLICATION_CREDENTIALS: /opt/secrets/gcp-sa-key.json

  spark-worker:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
      GOOGLE_APPLICATION_CREDENTIALS: /opt/secrets/gcp-sa-key.json
    depends_on:
      - spark-master
    deploy:
      replicas: 2

networks:
  data-platform-net:
    driver: bridge

volumes:
  postgres-data:
  postgres-source-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data: